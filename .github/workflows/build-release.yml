name: Build & Release Decodium

on:
  push:
    tags:
      - 'v*.*.*'          # Es. v3.0.2603070002 → crea release automatica
  workflow_dispatch:      # Esecuzione manuale da GitHub UI
    inputs:
      build_tag:
        description: 'Build tag (es. 2603070002)'
        required: true
        default: ''
      create_release:
        description: 'Crea release GitHub?'
        type: boolean
        default: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1: Build x64
  # ─────────────────────────────────────────────────────────────────────────
  build-x64:
    name: Build x64
    runs-on: windows-2022
    outputs:
      build_tag: ${{ steps.get_tag.outputs.build_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get build tag
        id: get_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.build_tag }}"
          else
            TAG=$(echo "$GITHUB_REF_NAME" | grep -oE '[0-9]{10}$' || echo "${GITHUB_REF_NAME##*v}")
          fi
          echo "build_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Build tag: $TAG"

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gcc-fortran
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-qt5-multimedia
            mingw-w64-x86_64-qt5-serialport
            mingw-w64-x86_64-qt5-websockets
            mingw-w64-x86_64-fftw
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-hamlib
            mingw-w64-x86_64-libusb

      - name: Configure CMake (x64)
        shell: msys2 {0}
        run: |
          mkdir -p build
          cmake "${{ github.workspace }}" \
            -B "${{ github.workspace }}/build" \
            -G "MinGW Makefiles" \
            -DCMAKE_PREFIX_PATH=/mingw64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_MAKE_PROGRAM=/mingw64/bin/mingw32-make.exe

      - name: Build Fortran (single thread)
        shell: msys2 {0}
        run: |
          cd "${{ github.workspace }}/build"
          mingw32-make -j1 wsjt_fort_omp

      - name: Build decodium + jt9
        shell: msys2 {0}
        run: |
          cd "${{ github.workspace }}/build"
          mingw32-make -j4 decodium jt9

      - name: Deploy Qt (windeployqt)
        shell: msys2 {0}
        run: |
          mkdir -p "${{ github.workspace }}/dist_64bit"
          cp build/decodium.exe dist_64bit/
          cp build/jt9.exe dist_64bit/
          cp build/message_aggregator.exe dist_64bit/ 2>/dev/null || true
          cp build/wsprd.exe dist_64bit/ 2>/dev/null || true
          cp build/udp_daemon.exe dist_64bit/ 2>/dev/null || true
          /mingw64/bin/windeployqt.exe --release --no-translations \
            --multimedia --websockets dist_64bit/decodium.exe
          cp contrib/Ephemeris/JPLEPH dist_64bit/
          cp cty.dat dist_64bit/ 2>/dev/null || true
          cp ALLCALL7.TXT dist_64bit/ 2>/dev/null || true

      - name: Upload dist_64bit artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-64bit
          path: dist_64bit/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2: Sign + Package + Release
  # ─────────────────────────────────────────────────────────────────────────
  sign-and-release:
    name: Sign & Release
    needs: build-x64
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist_64bit
        uses: actions/download-artifact@v4
        with:
          name: dist-64bit
          path: dist_64bit

      - name: Import code signing certificate
        shell: powershell
        run: |
          $pfxBytes = [Convert]::FromBase64String("${{ secrets.CODESIGN_PFX_BASE64 }}")
          $pfxPath = "$env:TEMP\codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, $pfxBytes)
          $pwd = ConvertTo-SecureString -String "${{ secrets.CODESIGN_PFX_PASSWORD }}" -Force -AsPlainText
          Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $pwd
          Remove-Item $pfxPath

      - name: Sign executables
        shell: powershell
        run: |
          $signtool = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe"
          if (-not (Test-Path $signtool)) {
            $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" | Select-Object -First 1).FullName
          }
          $thumb = (Get-ChildItem Cert:\CurrentUser\My -CodeSigningCert | Sort-Object NotAfter -Descending | Select-Object -First 1).Thumbprint
          Write-Host "Thumbprint: $thumb"
          Get-ChildItem -Path "dist_64bit" -Filter "*.exe" | ForEach-Object {
            Write-Host "Signing: $($_.FullName)"
            & $signtool sign /sha1 $thumb /fd SHA256 /t http://timestamp.digicert.com /v $_.FullName
          }

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Build x64 installer (Inno Setup)
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" decodium_x64.iss
          if errorlevel 1 exit /b 1

      - name: Sign x64 installer
        shell: powershell
        run: |
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" | Select-Object -First 1).FullName
          $thumb = (Get-ChildItem Cert:\CurrentUser\My -CodeSigningCert | Sort-Object NotAfter -Descending | Select-Object -First 1).Thumbprint
          $tag = "${{ needs.build-x64.outputs.build_tag }}"
          $installer = "Decodium_3.0_${tag}_FT2_x64_Setup.exe"
          if (Test-Path $installer) {
            & $signtool sign /sha1 $thumb /fd SHA256 /t http://timestamp.digicert.com /v $installer
          }

      - name: Create GitHub Release
        if: ${{ github.event_name == 'push' || github.event.inputs.create_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Decodium v3.0 FT2 Raptor — Build ${{ needs.build-x64.outputs.build_tag }}"
          body: |
            ## Decodium v3.0 FT2 Raptor — Build ${{ needs.build-x64.outputs.build_tag }}

            | File | Architettura |
            |------|-------------|
            | `Decodium_3.0_${{ needs.build-x64.outputs.build_tag }}_FT2_x64_Setup.exe` | Windows x64 |
          files: |
            Decodium_3.0_${{ needs.build-x64.outputs.build_tag }}_FT2_x64_Setup.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
